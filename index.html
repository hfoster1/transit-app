<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doomben Station Live Trains</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TrainIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="4" y="3" width="16" height="16" rx="2"/>
        <path d="M4 11h16"/>
        <path d="M12 3v8"/>
        <circle cx="8" cy="16" r="1"/>
        <circle cx="16" cy="16" r="1"/>
      </svg>
    );

    const ArrowRight = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 12h14"/>
        <path d="m12 5 7 7-7 7"/>
      </svg>
    );

    const RefreshCw = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
    );

    const AlertCircle = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    );

    const isDepartureTrain = (train) =>
      !train.service.toLowerCase().includes('drop-off') &&
      !train.scheduledTime.toLowerCase().includes('drop-off');

    const minutesValue = (minutesUntil) => parseInt(minutesUntil) || 0;

    const countdownColor = (minutesUntil) => {
      const mins = minutesValue(minutesUntil);
      if (minutesUntil === 'Now') return 'text-red-400';
      if (mins <= 5) return 'text-red-400';
      if (mins <= 10) return 'text-yellow-400';
      return 'text-green-400';
    };

    const TrainCard = ({ train }) => {
      const isDep = isDepartureTrain(train);
      const color = countdownColor(train.minutesUntil);

      return (
        <div className="bg-gray-800 rounded-lg p-4 mb-2 border border-gray-700 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className={`p-2 rounded-full ${isDep ? 'bg-green-900' : 'bg-blue-900'}`}>
              <TrainIcon className={`w-4 h-4 ${isDep ? 'text-green-400' : 'text-blue-400'}`} />
            </div>
            <div>
              <div className="font-semibold text-gray-100 text-sm">
                {isDep ? 'Departure \u2192 City' : 'Arrival \u2190 City'}
              </div>
              <div className="text-xs text-gray-500 mt-0.5">Scheduled {train.scheduledTime}</div>
            </div>
          </div>
          <div className={`text-xl font-bold tabular-nums ${color}`}>
            {train.minutesUntil}
          </div>
        </div>
      );
    };

    function DoombenTrains() {
      const [trains, setTrains] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);

      const WORKER_URL = 'https://proud-wood-b3ea.homehfoster.workers.dev/';

      const fetchTrains = async () => {
        setLoading(true);
        setError(null);
        try {
          const response = await fetch(WORKER_URL);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          if (data.error) throw new Error(data.error);
          setTrains(data.trains || []);
          setLastUpdate(new Date());
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchTrains();
        const interval = setInterval(fetchTrains, 30000);
        return () => clearInterval(interval);
      }, []);

      const formatTime = (date) =>
        date.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

      return (
        <div className="min-h-screen bg-gray-900 p-4">
          <div className="max-w-md mx-auto">

            {/* Header */}
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-3">
                <div className="bg-blue-600 p-2.5 rounded-full">
                  <TrainIcon className="w-5 h-5 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-gray-100 leading-tight">Doomben Station</h1>
                  <p className="text-xs text-gray-500">Platform 1 &middot; Live Times</p>
                </div>
              </div>
              <button
                onClick={fetchTrains}
                disabled={loading}
                className="p-2 rounded-full hover:bg-gray-800 transition-colors disabled:opacity-40"
                aria-label="Refresh"
              >
                <RefreshCw className={`w-5 h-5 text-gray-400 ${loading ? 'animate-spin' : ''}`} />
              </button>
            </div>

            {/* Error state */}
            {error && (
              <div className="bg-red-900 border border-red-700 rounded-lg p-4 mb-4 flex gap-2">
                <AlertCircle className="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" />
                <div>
                  <p className="text-red-200 font-semibold text-sm">Failed to load data</p>
                  <p className="text-xs text-red-300 mt-0.5">{error}</p>
                </div>
              </div>
            )}

            {/* Loading skeleton */}
            {loading && trains.length === 0 && (
              <div className="space-y-2">
                {[1, 2, 3].map(i => (
                  <div key={i} className="bg-gray-800 rounded-lg p-4 border border-gray-700 animate-pulse h-16" />
                ))}
              </div>
            )}

            {/* No services */}
            {!loading && !error && trains.length === 0 && (
              <div className="bg-yellow-900 border border-yellow-700 rounded-lg p-6 text-center">
                <AlertCircle className="w-10 h-10 text-yellow-400 mx-auto mb-2" />
                <p className="text-yellow-200 font-semibold">No upcoming services</p>
                <p className="text-xs text-yellow-300 mt-1">Nothing scheduled in the next 90 minutes.</p>
              </div>
            )}

            {/* Train list */}
            {trains.length > 0 && (
              <div>
                <h2 className="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2 flex items-center gap-1">
                  <ArrowRight className="w-3 h-3" />
                  All services &mdash; next 90 min
                </h2>
                {trains.map((train, i) => (
                  <TrainCard key={i} train={train} />
                ))}
              </div>
            )}

            {/* Footer */}
            <div className="mt-5 flex items-center justify-between text-xs text-gray-600">
              <div className="flex items-center gap-1.5">
                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse" />
                <span>TransLink via Cloudflare Worker</span>
              </div>
              {lastUpdate && <span>Updated {formatTime(lastUpdate)}</span>}
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DoombenTrains />);
  </script>
</body>
</html>
