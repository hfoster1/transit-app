<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doomben Station Live Trains</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    const Train = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="4" y="3" width="16" height="16" rx="2"/>
        <path d="M4 11h16"/>
        <path d="M12 3v8"/>
        <circle cx="8" cy="16" r="1"/>
        <circle cx="16" cy="16" r="1"/>
      </svg>
    );

    const ArrowRight = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 12h14"/>
        <path d="m12 5 7 7-7 7"/>
      </svg>
    );

    const RefreshCw = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
    );

    const AlertCircle = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    );

    function DoombenTrains() {
      const [trains, setTrains] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);

      const WORKER_URL = 'https://proud-wood-b3ea.homehfoster.workers.dev/';

      const fetchTrains = async () => {
        setLoading(true);
        setError(null);
        
        try {
          const response = await fetch(WORKER_URL);
          
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          
          const data = await response.json();
          
          if (data.error) {
            throw new Error(data.error);
          }
          
          if (!data.trains || data.trains.length === 0) {
            setTrains([]);
          } else {
            setTrains(data.trains);
          }
          
          setLastUpdate(new Date());
          
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchTrains();
        const interval = setInterval(fetchTrains, 30000);
        return () => clearInterval(interval);
      }, []);

      const formatTime = (date) => {
        return date.toLocaleTimeString('en-AU', { 
          hour: '2-digit', 
          minute: '2-digit' 
        });
      };

      const TrainCard = ({ train }) => {
        const isDropOff = train.service.toLowerCase().includes('drop-off') || 
                          train.scheduledTime.toLowerCase().includes('drop-off');
        
        const isArrival = isDropOff;
        const isDeparture = !isDropOff;
        
        return (
          <div className="bg-gray-800 rounded-lg shadow-lg p-4 mb-3 hover:bg-gray-750 transition-all border border-gray-700">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3 flex-1">
                <div className={`p-2 rounded-full ${isDeparture ? 'bg-green-900' : 'bg-blue-900'}`}>
                  <Train className={`w-5 h-5 ${isDeparture ? 'text-green-400' : 'text-blue-400'}`} />
                </div>
                <div className="flex-1">
                  <div className="font-semibold text-gray-100">
                    {isDeparture ? 'Departure' : 'Arrival'}
                  </div>
                  <div className="text-sm text-gray-400">
                    {isDeparture ? 'To City' : 'From City'} • {train.scheduledTime}
                  </div>
                </div>
              </div>
              <div className="text-right ml-4">
                <div className={`text-2xl font-bold ${
                  train.minutesUntil.includes('min') && parseInt(train.minutesUntil) <= 5 
                    ? 'text-red-400' 
                    : 'text-blue-400'
                }`}>
                  {train.minutesUntil}
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-900 p-4">
          <div className="max-w-2xl mx-auto">
            <div className="bg-gray-800 rounded-xl shadow-2xl p-6 mb-6 border border-gray-700">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                  <div className="bg-blue-600 p-3 rounded-full">
                    <Train className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold text-gray-100">Doomben Station</h1>
                    <p className="text-sm text-gray-400">Platform 1 - Live Times</p>
                  </div>
                </div>
                <button
                  onClick={fetchTrains}
                  disabled={loading}
                  className="p-2 rounded-full hover:bg-gray-700 transition-colors disabled:opacity-50"
                >
                  <RefreshCw className={`w-5 h-5 text-gray-300 ${loading ? 'animate-spin' : ''}`} />
                </button>
              </div>
              
              {lastUpdate && (
                <div className="text-xs text-gray-500 text-center">
                  Last updated: {formatTime(lastUpdate)}
                </div>
              )}
            </div>

            {error && (
              <div className="bg-red-900 border border-red-700 rounded-lg p-4 mb-6">
                <div className="flex items-start gap-2">
                  <AlertCircle className="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" />
                  <div>
                    <p className="text-red-200 font-semibold">Error loading data</p>
                    <p className="text-sm text-red-300 mt-1">{error}</p>
                  </div>
                </div>
              </div>
            )}

            {loading && trains.length === 0 && (
              <div className="bg-gray-800 rounded-lg shadow-lg p-8 text-center border border-gray-700">
                <RefreshCw className="w-12 h-12 text-blue-500 mx-auto mb-3 animate-spin" />
                <p className="text-gray-300">Loading live train data...</p>
              </div>
            )}

            {!loading && !error && trains.length === 0 && (
              <div className="bg-yellow-900 border border-yellow-700 rounded-lg p-6 text-center">
                <AlertCircle className="w-12 h-12 text-yellow-400 mx-auto mb-3" />
                <p className="text-yellow-200 font-semibold">No upcoming trains</p>
                <p className="text-sm text-yellow-300 mt-2">
                  There are no scheduled services in the next 90 minutes.
                </p>
              </div>
            )}

            {trains.length > 0 && (
              <div>
                <h2 className="text-lg font-semibold text-gray-200 mb-3 flex items-center gap-2">
                  <ArrowRight className="w-5 h-5" />
                  Arrivals & Departures (90 mins)
                </h2>
                {trains.map((train, i) => (
                  <TrainCard key={i} train={train} />
                ))}
              </div>
            )}

            <div className="mt-6 bg-green-900 border border-green-700 rounded-lg p-4">
              <div className="flex items-center gap-2 text-sm text-green-200">
                <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                <span className="font-semibold">Live data from TransLink via Cloudflare Worker</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<DoombenTrains />, document.getElementById('root'));
  </script>
</body>
</html>
